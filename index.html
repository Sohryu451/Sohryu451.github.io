<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=0.7">
  <title>Sohryu</title>
  <link rel= "shortcut icon" type="x-icon" href="https://github.com/Sohryu451/Sohryu451.github.io/blob/main/figures/icon.jpg?raw=true">
  <link rel= "stylesheet" href="scripts/style.css">
<script>
var w3 = {};
w3.includeHTML = function(cb) {
  var z, i, elmnt, file, xhttp;
  z = document.getElementsByTagName("*");
  for (i = 0; i < z.length; i++) {
    elmnt = z[i];
    file = elmnt.getAttribute("w3-include-html");
    if (file) {
      xhttp = new XMLHttpRequest();
      xhttp.onreadystatechange = function() {
        if (this.readyState == 4) {
          if (this.status == 200) {elmnt.innerHTML = this.responseText;}
          if (this.status == 404) {elmnt.innerHTML = "Page not found.";}
          elmnt.removeAttribute("w3-include-html");
          w3.includeHTML(cb);
        }
      }      
      xhttp.open("GET", file, true);
      xhttp.send();
      return;
    }
  }
  if (cb) cb();
};
</script>
</head>

<body>
  <div class="main" >
    <center><iframe width="420" height="315" src="https://www.youtube.com/embed/ia0XDOe7WgM">
    </center></iframe>

  </div>
</body>

<! navbar >

<p w3-include-html="scripts/navbar.html"></p> 
<script>w3.includeHTML();</script>

</html>
